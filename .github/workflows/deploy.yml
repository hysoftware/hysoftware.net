name: Deploy
on:
  push:
    tags:
      - "*"
    branches:
      - "deploy/*"
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "current"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Dependencies
        run: pnpm i
      - name: Build
        run: |
          pnpm run build --configuration production --no-progress
      - name: Store built files
        uses: actions/upload-artifact@v7
        with:
          name: hysoftware-dist
          path: dist
      - name: deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.FLARE_ZONE }}
